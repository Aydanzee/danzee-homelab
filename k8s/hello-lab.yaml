apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-lab
  namespace: lab
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hello-lab
  template:
    metadata:
      labels:
        app: hello-lab
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 96Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: hello-lab
  namespace: lab
spec:
  type: NodePort
  selector:
    app: hello-lab
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30080
