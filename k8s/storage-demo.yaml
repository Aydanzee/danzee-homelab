apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: storage-demo
  namespace: lab
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 100Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: storage-demo
  namespace: lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: storage-demo
  template:
    metadata:
      labels:
        app: storage-demo
    spec:
      containers:
        - name: alpine
          image: alpine:3.20
          command:
            - /bin/sh
            - -c
            - |
              test -f /data/created-at.txt || date -Iseconds > /data/created-at.txt
              while true; do sleep 3600; done
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 64Mi
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: storage-demo
